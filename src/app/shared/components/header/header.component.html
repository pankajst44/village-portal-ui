<mat-toolbar class="app-header">

  <!-- Hamburger — mobile + desktop sidenav toggle -->
  <button mat-icon-button (click)="toggleMenu()" class="menu-btn"
          [attr.aria-label]="'nav.menu' | translate">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Brand -->
  <div class="brand" (click)="goToDashboard()">
    <span class="brand-icon">🌿</span>
    <span class="brand-name">{{ 'app.name' | translate }}</span>
    <span class="brand-tagline hide-mobile">{{ 'app.tagline' | translate }}</span>
  </div>

  <span class="spacer"></span>

  <!-- Language switcher -->
  <vp-language-switcher></vp-language-switcher>

  <!-- User menu -->
  <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
    <mat-icon>account_circle</mat-icon>
    <span class="user-name hide-mobile">{{ userName }}</span>
    <mat-icon class="chevron">expand_more</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu" class="user-menu">
    <div class="user-menu-header">
      <strong>{{ userName }}</strong>
      <span class="role-badge">{{ 'user.roles.' + userRole | translate }}</span>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      {{ 'nav.logout' | translate }}
    </button>
  </mat-menu>

</mat-toolbar>
